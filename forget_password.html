<!DOCTYPE html>
<html lang="en">
    <head> 
        <!--to make the text display correctly -->
        <meta charset="UTF-8">
        <!--to make the website scale correctly on phone -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!--the external bootstrap library-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"> 
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
        <title>Forget password</title> 
    </head>

   

    <body class="bg-dark text-light">

        <!--navigation bar-->
        <div>
            <!--navbar-dark means light text colour-->
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <a class="navbar-brand" href="#"># 2048 Battle</a>
            </nav>
        </div>

        <!--put thing into row-->
        <div class="container mt-4 "> 
            <h1 class="text-center fw-bold">Join the battle now</h1>
            <!--to design how to put thing there is 3 layer-->
            <!--layer 1 div: where should it go-->
            <!--layer 2 div: what size it should be-->
            <!--layer 3 div: how should it look like-->
            <div class="row justify-content-center mt-4">
                <!--login detail-->
                <!--ms-auto move the list elemet right-->
                <div class="col-12 col-md-6 col-lg-4 ">
                        <div class="card p-5 text-center ">
                            <h2> Forget password </h2>

                            <form id= "update_login_detail">
                                <div class="mb-3 text-start">
                                    <label for="email" class="form-label">Email address:</label>
                                    <input id="email" type="email" class="form-control" aria-describedby="emailHelp"> 

                                    <span id="email_error" class="text-danger"></span>
                                </div>

                                <div class="mb-3 text-start">
                                    <label for="password" class="form-label"> New Password:</label>
                                    <input id="password" type="password" class="form-control"> 

                                    <span id="password_error" class="text-danger"></span>
                                </div>

                                <div class="mb-3 text-start">
                            
                                    <label for="confirmPassword" class="form-label"> Confirm Password:</label>
                                    <input id="confirmPassword" type="password" class="form-control"> 

                                    <span id="confirm_password_error" class="text-danger"></span>
                                </div>

                                <div class="mb-3 d-flex justify-content-between">
                                    <button type="submit" class=" btn btn-success">Confirm</button>
                                    <button type="button" class="btn btn-danger" onclick="window.location.href='/homepage_not_login.html'">Cancel</button>
                                </div>

                                <div class="mb-3 text-start">
                                    
                                </div>

                            </form>
                            

                        </div>
                    </div> 
                </div>
            </div><br>
         
            <script src="/forget_password.js"></script>
        </body>
       
</html>
