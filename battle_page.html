<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Battle - Matchmaking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        /* 2048 Grid Styles */
        .grid-container {
            background-color: #bebebe;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 12px;
            padding: 12px;
            border-radius: 8px;
            width: 320px;
            height: 320px;
        }

        .grid-cell {
            background-color: rgba(255, 255, 255, 0.35);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            width: 60px;
            height: 60px;
            font-weight: bold;
            color: #db944e;
        }

        .tile-2 {
            background-color: #eee4da;
            box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0), inset 0 0 0 1px rgba(255, 255, 255, 0);
        }

        /* Custom Transitions */
        .copy-feedback {
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header / Navigation -->
    <header class="bg-gray-200 border-b border-gray-300 py-3 px-6 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-black text-white p-2 rounded cursor-pointer hover:bg-gray-800 transition-colors">
                <i class="fa-solid fa-expand text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">2048 Battle</h1>
        </div>
        
        <nav class="flex items-center gap-4">
            <button class="px-3 py-1 text-sm font-medium bg-white shadow-sm rounded-md text-blue-600 transition-colors">Home</button>
            <button class="px-3 py-1 text-sm font-medium hover:text-blue-600 transition-colors">Log In</button>
            <button class="px-3 py-1 text-sm font-medium hover:text-blue-600 transition-colors">Sign Up</button>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center p-6 bg-white">
        
        <!-- Match Status -->
        <h2 class="text-3xl font-bold text-center mb-8">
            Player Bob <span class="text-gray-400 font-normal italic mx-2">vs</span> .....
        </h2>

        <!-- Room Code Section -->
        <div class="relative flex items-center mb-10 w-full max-w-md">
            <input 
                id="roomCode" 
                type="text" 
                value="523abdc" 
                readonly 
                class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg text-lg font-medium text-gray-700 focus:outline-none focus:border-gray-300"
            >
            <button 
                onclick="copyRoomCode()" 
                class="ml-3 p-3 text-gray-500 hover:text-black hover:bg-gray-100 rounded-lg transition-all active:scale-95"
                title="Copy Room Code"
            >
                <i class="fa-regular fa-copy text-2xl"></i>
            </button>
            
            <!-- Toast Feedback -->
            <div id="copyToast" class="absolute -top-8 right-0 opacity-0 bg-black text-white text-xs py-1 px-2 rounded copy-feedback">
                Copied!
            </div>
        </div>


        <!-- Battle Bar Section -->
        <div class="w-full max-w-md mb-8">
            <div class="flex justify-between items-end mb-2">
                <div class="flex flex-col">
                    <span class="text-xs font-bold text-blue-600 uppercase">You</span>
                    <span class="text-xl font-bold">0</span>
                </div>
                <div class="text-center pb-1">
                    <span class="bg-gray-100 px-3 py-1 rounded-full text-xs font-bold text-gray-500 border border-gray-200">
                        BATTLE PROGRESS
                    </span>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-xs font-bold text-gray-400 uppercase">Opponent</span>
                    <span class="text-xl font-bold text-gray-300">0</span>
                </div>
            </div>
            
            <!-- Battle Bar Background -->
            <div class="h-4 w-full bg-gray-100 rounded-full overflow-hidden border border-gray-200 flex">
                <!-- Player Progress (Blue) -->
                <div id="playerProgress" class="progress-fill h-full bg-blue-500 shadow-[inset_-2px_0_4px_rgba(0,0,0,0.1)]" style="width: 50%"></div>
                <!-- Opponent Progress (Light Gray) -->
                <div id="opponentProgress" class="progress-fill h-full bg-gray-300" style="width: 0%"></div>
            </div>
            <p class="text-[10px] text-gray-400 mt-2 text-center uppercase tracking-widest font-bold">Win by reaching 2048 first</p>
        </div>

        

        <!-- Preview Grid -->
        <div class="grid-container shadow-xl mb-8">
            <!-- Row 1 -->
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <!-- Row 2 -->
            <div class="grid-cell"></div>
            <div class="grid-cell tile-2">2</div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <!-- Row 3 -->
            <div class="grid-cell"></div>
            <div class="grid-cell tile-2">2</div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <!-- Row 4 -->
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
        </div>

        <!-- Status & Action -->
        <p class="text-xl font-medium text-gray-800 mb-6 flex items-center gap-2">
            Waiting for Player to Join
            <span class="flex gap-1">
                <span class="animate-bounce" style="animation-delay: 0s">.</span>
                <span class="animate-bounce" style="animation-delay: 0.2s">.</span>
                <span class="animate-bounce" style="animation-delay: 0.4s">.</span>
            </span>
        </p>

        <button 
            id="startBtn"
            class="px-12 py-3 bg-gray-200 border-2 border-gray-300 text-gray-700 font-bold rounded-lg hover:bg-gray-300 hover:border-gray-400 transition-all active:translate-y-0.5"
        >
            Start Match
        </button>

    </main>

</body>
</html>
