<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #333;
      color: white;
      padding: 10px 20px;
    }

    .nav-right button {
      padding: 8px 14px;
      border: none;
      border-radius: 5px;
      background-color: #555;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    .nav-right button:hover {
      background-color: #666;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-size: 20px;
      font-weight: bold;
    }

    .profile {
      margin-left: auto;
    }

    .profile button {
      padding: 8px 14px;
      border: none;
      border-radius: 5px;
      background-color: #555;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    .profile button:hover {
      background-color: #666;
    }

    /* Main Content */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 60px);
    }
    

    .buttons {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-color: #db0cc6;
      color: white;
    }

    button:hover {
      background-color: #df0fa4;
    }

    .or {
      font-weight: bold;
      font-size: 18px;
    }

    .join-section {
      display: flex;
      gap: 10px;
    }

    input {
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
      width: 200px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="navbar">
  <a href="/home">2048</a>
  <button id="profileBtn">Profile</button>
</div>

<div class="container">
  <h2>Welcome to 2048</h2>

  <button id="createGameBtn">Create Game</button>
  <button id="createTournamentBtn">Create Tournament</button>

  <br><br>

  <input id="matchCode" maxlength="5" placeholder="Enter Code">
  <button id="joinGameBtn">Join Game</button>
</div>

<script src="/static/js/homepage_logged_in.js"></script>

</body>
</html>
