{% extends "layout.html" %}
{% block content %}
    <!-- Centered width control using grid -->
    <div class="row justify-content-center py-5">
        <div class="col-lg-8 col-md-10">

            <!-- Top Row -->
            <div class="row align-items-center text-center mb-3">
                <!-- <div class="col-5">
                    <button class="btn btn-primary w-100">
                        Create a Match
                    </button>
                </div> -->

                <div class="col-5">
                    <a href="{{ url_for('match') }}" class="btn btn-primary w-100">
                        Create a Match
                    </a>
                </div>

                <div class="col-2 fw-bold">
                    OR
                </div>

                <div class="col-5">
                    <a href="{{ url_for('create_tournament') }}" class="btn btn-success w-100">
                         Create a Tournament
                    </a>
                </div>
            </div>

            <!-- Divider -->
            <hr class="my-3">

            <!-- Bottom Input -->
            <div class="input-group">
                <form action="{{url_for('match') }}" method="POST">
                    <input type="text" name=""  class="form-control" placeholder="Enter match code">
                    <button class="btn btn-outline-primary px-5">
                    Join
                </button>
                </form>
            </div>

        </div>
    </div>
{% endblock content %}
