{% extends "layout.html" %}
{% block content %}
    <div class="container py-5">
        <div class="row justify-content-center align-items-start g-4">

            <div class="col-md-6 col-lg-5 text-center">
                <h4>
                    Player Score: <span id="score-player">0</span>
                </h4>
                <div class="game-container d-flex justify-content-center">
                    <div id="board-player">
                    </div>
                </div>
            </div>

            <div class="col-md-6 col-lg-5 text-center">
                <h4>
                    Enemy Score: <span id="score-enemy">0</span>
                </h4>
                <div class="game-container d-flex justify-content-center">
                    <div id="board-enemy">
                    </div>
                </div>
            </div>

        </div>
    </div>
{% endblock content %}
