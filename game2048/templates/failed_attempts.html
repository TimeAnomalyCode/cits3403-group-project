<div class="board" id="board">
    <div id="tile-container"></div>
</div>

<script>
let board = {{ board | tojson }};
let tiles = []; // track tile objects
const size = 4;
const cellSize = 80; // includes margin

const container = document.getElementById("tile-container");

// Create tile
function createTile(value, x, y) {
    const el = document.createElement("div");
    el.className = `tile tile-${value}`;
    el.textContent = value;

    container.appendChild(el);

    return { el, value, x, y };
}

// Set position
function setPosition(tile) {
    tile.el.style.transform =
        `translate(${tile.y * cellSize}px, ${tile.x * cellSize}px)`;
}

// Initialize tiles
function initTiles() {
    container.innerHTML = "";
    tiles = [];

    for (let i = 0; i < size; i++) {
        for (let j = 0; j < size; j++) {
            if (board[i][j] !== 0) {
                let tile = createTile(board[i][j], i, j);
                tiles.push(tile);
                setPosition(tile);
            }
        }
    }
}

// Slide logic (same as before)
function slide(row) {
    row = row.filter(v => v);

    for (let i = 0; i < row.length - 1; i++) {
        if (row[i] === row[i+1]) {
            row[i] *= 2;
            row[i+1] = 0;
        }
    }

    row = row.filter(v => v);

    while (row.length < 4) row.push(0);
    return row;
}

// Move + animate
function moveLeft() {
    let newBoard = board.map(row => slide(row));

    updateTiles(newBoard);
    board = newBoard;
}

// Update tiles with animation
function updateTiles(newBoard) {
    let newTiles = [];

    for (let i = 0; i < size; i++) {
        for (let j = 0; j < size; j++) {
            if (newBoard[i][j] !== 0) {
                let tile = tiles.find(t => t.x === i && t.y === j);

                if (!tile) {
                    tile = createTile(newBoard[i][j], i, j);
                }

                tile.value = newBoard[i][j];
                tile.el.textContent = tile.value;
                tile.el.className = `tile tile-${tile.value}`;

                tile.x = i;
                tile.y = j;

                setPosition(tile);
                newTiles.push(tile);
            }
        }
    }

    tiles = newTiles;
}

// Controls
document.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft") moveLeft();
});

// Init
initTiles();
</script>
